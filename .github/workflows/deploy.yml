name: Deploy

# Merge to main  -> deploy to the `staging` environment
# Publish a Release -> deploy to the `production` environment
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read

# Pick the target environment from the trigger. Environment-scoped secrets/vars
# (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID,
# SITE_URL) resolve automatically from whichever environment is selected.
concurrency:
  group: deploy-${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          # Selected environment name; Astro uses it to noindex non-prod builds.
          DEPLOY_ENV: ${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
        run: pnpm build

      # Matches the associo-frontend pipeline: access keys + us-east-1, scoped per
      # GitHub Environment. (Swap to OIDC later if associo-iac adds deploy roles.)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          # Long-cache fingerprinted assets, short-cache HTML/XML/TXT so deploys go live fast
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
