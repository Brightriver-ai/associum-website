name: Deploy

# Merge to main  -> deploy to the `staging` environment
# Publish a Release -> deploy to the `production` environment
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [staging, production]
        default: staging

# Required for requesting the OIDC JWT used to assume the AWS deploy role
permissions:
  id-token: write
  contents: read

# Pick the target environment from the trigger. Environment-scoped secrets/vars
# (AWS_ROLE_ARN, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, SITE_URL)
# resolve automatically from whichever environment is selected.
concurrency:
  group: deploy-${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          # Selected environment name; Layout.astro uses it to noindex non-prod builds.
          DEPLOY_ENV: ${{ github.event_name == 'release' && 'production' || (github.event.inputs.environment || 'staging') }}
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          # Long-cache fingerprinted assets, short-cache HTML/XML/TXT so deploys go live fast
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
